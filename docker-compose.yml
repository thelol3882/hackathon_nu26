services:
  # ---- Infrastructure ----
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d locomotive_telemetry"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Services ----
  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
  redis_data:
