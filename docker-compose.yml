services:
  # ---- Infrastructure ----

  # Plain PostgreSQL for CRUD data (auth, locomotives, reports, config).
  # Small tables with standard ORM operations — no need for TimescaleDB features.
  postgres:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_USER: locomotive_app
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: locomotive_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locomotive_app -d locomotive_app"]
      interval: 5s
      timeout: 3s
      retries: 5

  # TimescaleDB for time-series data (raw telemetry, alerts, health snapshots,
  # continuous aggregates). Millions of rows with hypertable compression and retention.
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    env_file: .env
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d locomotive_telemetry"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: locomotive
      RABBITMQ_DEFAULT_PASS: changeme
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - METRICS_STORAGE_TYPE=
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=5000
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    deploy:
      resources:
        limits:
          memory: 512M

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./deploy/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - processor
      - api-gateway
      - report-service
      - db-writer
      - ws-server

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DATASOURCES_DEFAULT_NAME=Prometheus
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger

  # ---- Services ----
  processor:
    build:
      context: .
      dockerfile: services/processor/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  db-writer:
    build:
      context: .
      dockerfile: services/db-writer/Dockerfile
    env_file: .env
    environment:
      - DB_WRITER_CONSUMER_NAME=writer-1
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      processor:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  ws-server:
    build:
      context: .
      dockerfile: services/ws-server/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    env_file: .env
    depends_on:
      processor:
        condition: service_started
      api-gateway:
        condition: service_healthy
    ports:
      - "8003:8000"

  dashboard:
    build:
      context: ./frontend/dashboard
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_WS_URL: ""
    env_file: .env
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Reverse Proxy ----
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - ws-server
      - dashboard

volumes:
  postgres_data:
  timescaledb_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
