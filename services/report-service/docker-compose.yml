services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    env_file: ../../.env
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d locomotive_telemetry"]
      interval: 5s
      timeout: 3s
      retries: 5

  report-service:
    build:
      context: ../../
      dockerfile: services/report-service/Dockerfile
    ports:
      - "8002:8002"
    env_file: ../../.env
    volumes:
      - ./:/app
      - ../../shared/shared:/usr/local/lib/python3.13/site-packages/shared
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescaledb_data:
